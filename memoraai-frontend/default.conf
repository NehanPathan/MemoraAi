# ════════════════════════════════════════════════════════════════
# 🌐 Nginx Server Configuration
# ════════════════════════════════════════════════════════════════
# Default server configuration for MemoraAI Frontend
# ════════════════════════════════════════════════════════════════

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    # ════════════════════════════════════════════════════════════════
    # Root Directory
    # ════════════════════════════════════════════════════════════════
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ════════════════════════════════════════════════════════════════
    # Security Headers
    # ════════════════════════════════════════════════════════════════
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com; frame-src https://accounts.google.com;" always;

    # ════════════════════════════════════════════════════════════════
    # Caching Strategy
    # ════════════════════════════════════════════════════════════════

    # Cache busted assets (files with hash in name) - long cache
    location ~* \.[a-f0-9]+\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static assets without hash - cache for 1 month
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ════════════════════════════════════════════════════════════════
    # Proxy to Backend API
    # ════════════════════════════════════════════════════════════════
    location /api/ {
        # Use backend service name in Docker
        proxy_pass http://backend:8000/api/;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ════════════════════════════════════════════════════════════════
    # SPA Routing (React Router)
    # ════════════════════════════════════════════════════════════════
    # All non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ════════════════════════════════════════════════════════════════
    # Error Pages
    # ════════════════════════════════════════════════════════════════
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ════════════════════════════════════════════════════════════════
    # Deny Access to Sensitive Files
    # ════════════════════════════════════════════════════════════════
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
    }

    # ════════════════════════════════════════════════════════════════
    # Health Check Endpoint
    # ════════════════════════════════════════════════════════════════
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ════════════════════════════════════════════════════════════════
    # Favicon & Robots
    # ════════════════════════════════════════════════════════════════
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
